services:
  mysql:
    image: mysql:8.0.39
    container_name: askdb-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_dev_pass   # DEV ONLY — never use in production
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/seed/demo.sql:/docker-entrypoint-initdb.d/demo.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_dev_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: askdb-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13.7-management
    container_name: askdb-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest   # DEV ONLY — never use in production
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI (http://localhost:15672)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # One-shot schema migration runner (golang-migrate), pinned version.
  # Not started by `docker compose up`; run manually with the "migrate" profile:
  #   docker compose --profile migrate run --rm migrate
  # Roll back one step with:
  #   docker compose --profile migrate run --rm migrate -path=/migrations \
  #     -database=mysql://askdb_app:app_dev_pass@tcp(mysql:3306)/askdb_app down 1
  migrate:
    image: migrate/migrate:v4.17.1
    profiles: ["migrate"]
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./db/migrations:/migrations:ro
    # DEV ONLY credentials — matches db/seed/demo.sql. Never use in production.
    command:
      - "-path=/migrations"
      - "-database=mysql://askdb_app:app_dev_pass@tcp(mysql:3306)/askdb_app"
      - "up"

volumes:
  mysql_data:
